parameters:
  - name: ServiceDirectory
    type: string
    default: ''
  - name: TestPipeline
    type: boolean
    default: false
  - name: TestMarkArgument
    type: string
    default: ''
  - name: BeforeTestSteps
    type: object
    default: []
  - name: AfterTestSteps
    type: object
    default: []
  - name: BuildTargetingString
    type: string
    default: 'azure-*'
  - name: TestTimeoutInMinutes
    type: number
    default: 60
  - name: UnsupportedChecks
    type: string
    default: ''
  - name: InjectedPackages
    type: string
    default: ''
  - name: DependsOn
    type: object
    default: []
  - name: Matrix
    type: string
  - name: UsePlatformContainer
    type: boolean
    default: false
  - name: CloudConfig
    type: object
    default: {}
  - name: TestProxy
    type: boolean
    default: false
  - name: OSName
    type: string
  - name: EnvVars
    type: object
    default: {}

jobs:
  - job:
    displayName: 'Test'
    condition: |
      and(
        succeededOrFailed(),
        ne(variables['Skip.Test'], 'true'),
        ne(${{ parameters.Matrix }}, '{}')
      )
    timeoutInMinutes: ${{ parameters.TestTimeoutInMinutes }}

    dependsOn:
      - ${{ parameters.DependsOn }}

    strategy:
      matrix: $[ ${{ parameters.Matrix }} ]

    pool:
      name: $(Pool)
      # 1es pipeline templates converts `image` to demands: ImageOverride under the hood
      # which is incompatible with image selection in the default non-1es hosted pools
      ${{ if eq(parameters.OSName, 'macOS') }}:
        vmImage: $(OSVmImage)
      ${{ else }}:
        image: $(OSVmImage)
      os: ${{ parameters.OSName }}

    templateContext:
      # Compiled CodeQL is auto-injected by 1ES but is unsupported on macOS ARM64
      # (and the test jobs do not compile the extension). Mirror the Build_MacOS carve-out.
      ${{ if eq(parameters.OSName, 'macOS') }}:
        sdl:
          codeql:
            compiled:
              enabled: false
              justificationForDisabling: "Compiled language support is not available on macOS ARM64. See: https://eng.ms/docs/coreai/devdiv/one-engineering-system-1es/1es-docs/codeql/troubleshooting/onboarding/language-compiled#arm64-cpu-on-macos"
      # See eng/common/pipelines/templates/steps/upload-llm-artifacts.yml for corresponding file copy step
      outputs:
        - output: pipelineArtifact
          targetPath: '$(Build.ArtifactStagingDirectory)/llm-artifacts'
          artifactName: "LLM Artifacts - $(System.JobName) - $(System.JobAttempt)"
          condition: eq(variables['uploadLlmArtifacts'], 'true')
          sbomEnabled: false

    variables:
    - template: ../variables/globals.yml
    - name: InjectedPackages
      value: ${{ parameters.InjectedPackages }}

    steps:
    - ${{ if eq(lower(parameters.OSName), 'macos') }}:
      - pwsh: |
          $dotnetroot = "$HOME/.dotnet"
          Write-Host $dotnetroot
          Write-Host "##vso[task.setvariable variable=DOTNET_ROOT]$dotnetroot"
        displayName: 'Set DOTNET_ROOT'

    - ${{ if endsWith(variables['Build.Repository.Name'], '-pr') }}:
      - checkout: self
        displayName: 'Sparse checkout eng/common/scripts for GitHub login'
        path: s/_login_scripts
        sparseCheckoutDirectories: eng/common/scripts
        fetchDepth: 1
  
      - pwsh: |
          $source = "$(Build.SourcesDirectory)/_login_scripts/eng"
          $dest = "$(Agent.TempDirectory)"
          Copy-Item -Recurse -Force $source $dest
          Remove-Item -Recurse -Force "$(Build.SourcesDirectory)/*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$(Build.SourcesDirectory)/.git" -ErrorAction SilentlyContinue
        displayName: Copy and clean repo checkout folder
      
      - template: /eng/common/pipelines/templates/steps/login-to-github.yml
        parameters:
          ScriptDirectory: "$(Agent.TempDirectory)/eng/common/scripts"

    - template: /eng/common/pipelines/templates/steps/sparse-checkout.yml
      parameters:
        ${{ if endsWith(variables['Build.Repository.Name'], '-pr') }}:
          TokenToUseForAuth: $(GH_TOKEN)
        Paths:
          - '**'

    - template: /eng/pipelines/templates/steps/download-package-artifacts.yml

    - template: /eng/pipelines/templates/steps/resolve-package-targeting.yml
      parameters:
        BuildTargetingString: ${{ parameters.BuildTargetingString }}
        PackagePropertiesFolder: $(Build.ArtifactStagingDirectory)/PackageInfo

    - template: /eng/common/pipelines/templates/steps/verify-agent-os.yml
      parameters:
        AgentImage: ${{ parameters.OSName }}

    - template: ../steps/build-test.yml
      parameters:
        ServiceDirectory: ${{ parameters.ServiceDirectory }}
        TestMarkArgument: ${{ parameters.TestMarkArgument }}
        AdditionalTestArgs: '--wheel_dir="$(Build.ArtifactStagingDirectory)"'
        CoverageArg: $(CoverageArg)
        PythonVersion: $(PythonVersion)
        CheckEnv: $(checks)
        InjectedPackages: $(InjectedPackages)
        TestProxy: ${{ parameters.TestProxy }}
        TestPipeline: ${{ parameters.TestPipeline }}
        BeforeTestSteps:
          - ${{ each step in parameters.BeforeTestSteps }}:
            -  ${{ step }}
        AfterTestSteps: ${{ parameters.AfterTestSteps }}
        EnvVars: ${{ parameters.EnvVars }}
