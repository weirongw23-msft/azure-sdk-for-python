# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

trigger:
  branches:
    include:
      - main
      - hotfix/*
      - release/*
      - restapi*
  paths:
    include:
      - sdk/agentserver/
      - sdk/core/

pr:
  branches:
    include:
      - main
      - feature/*
      - hotfix/*
      - release/*
      - restapi*
  paths:
    include:
      - sdk/agentserver/
      - sdk/core/

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: agentserver
    TestProxy: true
    BuildDocs: true
    TestTimeoutInMinutes: 60
    MatrixConfigs:
      - Name: agentserver
        Path: sdk/agentserver/platform-matrix.json
        Selection: sparse
        GenerateVMJobs: true
    Artifacts:
      - name: azure-ai-agentserver-core
        safeName: azureaiagentservercore
      - name: azure-ai-agentserver-invocations
        safeName: azureaiagentserverinvocations
      - name: azure-ai-agentserver-responses
        safeName: azureaiagentserverresponses
      - name: azure-ai-agentserver-ghcopilot
        safeName: azureaiagentserverghcopilot
      - name: azure-ai-agentserver-optimization
        safeName: azureaiagentserveroptimization
