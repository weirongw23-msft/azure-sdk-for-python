trigger: none

extends:
    template: /eng/pipelines/templates/stages/archetype-sdk-tests.yml
    parameters:
      # Cosmos split lane takes long (real partition splits); 120 min default is too tight.
      TestTimeoutInMinutes: 180
      CloudConfig:
        Public:
          ServiceConnection: azure-sdk-tests-cosmos
      MatrixConfigs:
        - Name: Cosmos_live_test
          Path: sdk/cosmos/live-platform-matrix.json
          Selection: all
          GenerateVMJobs: true
      MaxParallel: 8
      BuildTargetingString: azure-cosmos
      ServiceDirectory: cosmos
